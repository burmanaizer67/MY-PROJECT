<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MODERN-PROJECT | Kontakt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrap">
    <header class="site-header">
      <a class="brand" href="index.html">MODERN<span>-PROJECT</span></a>
      <nav class="site-nav">
        <a href="index.html">Start</a>
        <a href="about.html">Om</a>
        <a class="active" href="contact.html">Kontakt</a>
      </nav>
    </header>

    <section class="hero">
      <p class="kicker">Kontakt</p>
      <h2>Skicka ett meddelande</h2>
      <p class="lead">Formuläret är byggt för övning i HTML/CSS och kan senare kopplas till backend eller form-tjänst.</p>
    </section>

    <section class="panel">
      <form class="form-grid" action="#" method="post">
        <label for="name">Namn</label>
        <input id="name" name="name" type="text" placeholder="Ditt namn" required>

        <label for="email">E-post</label>
        <input id="email" name="email" type="email" placeholder="namn@example.com" required>

        <label for="message">Meddelande</label>
        <textarea id="message" name="message" placeholder="Skriv ditt meddelande här" required></textarea>

        <button type="submit">Skicka</button>
      </form>
    </section>

    <footer class="site-footer">
      <p>Kontaktsektionen är redo för nästa steg i kursen.</p>
    </footer>
  </div>
</body>
</html>
